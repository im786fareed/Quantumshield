name: Android Release Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:   # ← manually trigger from GitHub Actions tab

jobs:
  build-android:
    name: Build & Sign Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Node.js ───────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Android SDK — accept licences + install API 36 ────────────────
      #    ubuntu-latest already has the Android SDK at $ANDROID_HOME.
      #    We just need to install the specific API level the project requires.
      - name: Accept Android SDK licences
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || \
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || \
          true

      - name: Install Android API 36 + build-tools
        run: |
          SDK=$ANDROID_HOME
          MGR="$SDK/cmdline-tools/latest/bin/sdkmanager"
          # Fallback path for some runner images
          [ -f "$MGR" ] || MGR="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          # Install the components our project needs
          "$MGR" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools"
          echo "Android SDK ready:"
          echo "  compileSdkVersion=36"
          ls "$SDK/platforms/" 2>/dev/null || true

      # ── 5. Install npm dependencies ──────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 6. Build the real web bundle into out/ ───────────────────────────
      #    The APK ships the full app (Google Play "minimum functionality").
      #    API calls go to the production deployment via src/lib/apiBase.ts.
      - name: Build static web bundle
        run: npm run build:android

      # ── 7. Capacitor sync ─────────────────────────────────────────────────
      - name: Sync Capacitor → Android
        run: npx cap sync android

      # ── 8. google-services.json (optional — push notifications only) ──────
      - name: Write google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          fi

      # ── 9. Restore signing keystore ───────────────────────────────────────
      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/quantumshield-release.jks
          echo "Keystore decoded: $(ls -lh android/quantumshield-release.jks)"

      # ── 10. Write keystore.properties ────────────────────────────────────
      #    Uses printf to avoid any heredoc indentation issues.
      - name: Write keystore.properties
        run: |
          printf 'storeFile=quantumshield-release.jks\nstorePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}\nkeyAlias=quantumshield\nkeyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}\n' \
            > android/keystore.properties
          echo "keystore.properties written:"
          cat android/keystore.properties

      # ── 11. Gradle permissions ────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 12. Build signed release AAB (Play Store) ─────────────────────────
      #    Capture ALL output to a log file so we can download it as an
      #    artifact and see the exact error even if the step fails.
      - name: Build release AAB
        working-directory: android
        run: |
          set -o pipefail
          ./gradlew bundleRelease --no-daemon --info 2>&1 | tee /tmp/gradle-aab.log
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 13. Build signed release APK (direct install / testing) ──────────
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 14. Upload Gradle build log (ALWAYS — even on failure, for debugging)
      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-aab.log
          retention-days: 3

      # ── 16. Upload AAB artifact ───────────────────────────────────────────
      - name: Upload AAB (Play Store bundle)
        uses: actions/upload-artifact@v4
        with:
          name: QuantumShield-v${{ github.run_number }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 17. Upload APK artifact ───────────────────────────────────────────
      - name: Upload APK (direct install)
        uses: actions/upload-artifact@v4
        with:
          name: QuantumShield-v${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── 18. GitHub Release on tag push (e.g. git tag v1.1 && git push --tags)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
