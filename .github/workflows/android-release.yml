name: Android Release Build

# Triggers on every push to main — Vercel handles web, this handles APK/AAB
on:
  push:
    branches: [main]
  workflow_dispatch:          # Also allows manual trigger from GitHub UI

jobs:
  build-android:
    name: Build & Sign Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by Gradle 8 + AGP 8) ────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Node.js (for Next.js build + Capacitor sync) ──────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install npm dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Build Next.js static export ────────────────────────────────────
      # Note: capacitor.config.ts uses server.url (quantumshield.in),
      # so the web build is optional for live-URL mode. We still build
      # to keep the bundle fresh and in sync.
      - name: Build Next.js (static export for app bundle)
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      # ── 6. Capacitor sync ─────────────────────────────────────────────────
      - name: Sync Capacitor → Android
        run: npx cap sync android

      # ── 7. Firebase google-services.json ──────────────────────────────────
      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      # ── 8. Decode & write keystore ────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/quantumshield-release.jks

      # ── 9. Write keystore.properties ──────────────────────────────────────
      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storeFile=../quantumshield-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # ── 10. Gradle permissions ────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 11. Build release AAB (Play Store format) ─────────────────────────
      - name: Build signed release AAB
        run: |
          cd android
          ./gradlew bundleRelease --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 12. Build release APK (direct install / side-load) ────────────────
      - name: Build signed release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace

      # ── 13. Upload AAB artifact ───────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: QuantumShield-release-${{ github.run_number }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 14. Upload APK artifact ───────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuantumShield-release-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── 15. Create GitHub Release (on tag push) ───────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Optional: Deploy to Play Store via Google Play API ─────────────────────
  # Uncomment when you have PLAY_STORE_SERVICE_ACCOUNT_JSON secret ready
