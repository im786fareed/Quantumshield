name: Android Release Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build & Sign Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Node.js ───────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install npm dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Build Next.js ──────────────────────────────────────────────────
      - name: Build Next.js
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY || 'placeholder' }}

      # ── 6. Ensure assets directory exists (required by Capacitor) ─────────
      - name: Create Android assets and out directories
        run: |
          mkdir -p android/app/src/main/assets
          mkdir -p out
          echo "<html><body>QuantumShield Wrapper</body></html>" > out/index.html

      # ── 7. Capacitor sync ─────────────────────────────────────────────────
      - name: Sync Capacitor → Android
        run: npx cap sync android

      # ── 8. Write google-services.json (use secret or fall back to template)
      - name: Write google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          else
            cp android/app/google-services.json.template android/app/google-services.json
          fi

      # ── 9. Decode & write keystore ────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/quantumshield-release.jks

      # ── 10. Write keystore.properties ─────────────────────────────────────
      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storeFile=../quantumshield-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # ── 11. Gradle permissions ────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 12. Build release AAB ─────────────────────────────────────────────
      - name: Build signed release AAB
        run: |
          cd android
          ./gradlew bundleRelease --stacktrace

      # ── 13. Build release APK ─────────────────────────────────────────────
      - name: Build signed release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace

      # ── 14. Upload AAB artifact ───────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: QuantumShield-release-${{ github.run_number }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 15. Upload APK artifact ───────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuantumShield-release-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── 16. Create GitHub Release (on tag push) ───────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
